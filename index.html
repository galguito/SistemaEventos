<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="d-flex justify-content-between align-items-center mt-3 border-bottom">
                <div>
                    <h1>
                        Proximos Eventos
                    </h1>
                    <p>
                        Descubre y reserva los mejores eventos
                    </p>
                </div>
                <div>
                    <button type="button" class="btn btn-primary"><i class="bi bi-plus me-2"></i> Crear Evento</button>
                </div>
            </div>
        </header>
        <main>
            <div class="row mt-4">
                <div class="col d-md-flex align-items-center gap-2">
                    <input type="search" placeholder="Buscar eventos..." class="form-control my-3 my-md-0">
                    <select name="" id="" class="form-select my-3 my-md-0">
                        <option value="" selected disabled>
                            Todas las categorias
                        </option>
                        <option value="">
                            Galgos Fest
                        </option>
                        <option value="">
                            Piranas Fest
                        </option>
                    </select>
                    <div>
                        <button type="button" class="btn btn-primary"><i class="bi bi-plus me-2"></i> Buscar</button>
                    </div>
                </div>
                
            </div>
        </main>
    </div>








    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
